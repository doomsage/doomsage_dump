<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload | Daily Photo Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="upload">
    <header class="topbar">
      <h1>Upload Photo</h1>
      <nav class="nav-actions">
        <a class="btn ghost" href="gallery.html">Timeline</a>
        <button id="logoutBtn" class="btn ghost" type="button">Logout</button>
      </nav>
    </header>

    <main class="container page-center">
      <section class="card upload-card fade-up">
        <form id="uploadForm" class="stack-gap">
          <label for="photoInput" class="label">Choose image (max 5MB)</label>
          <input id="photoInput" name="photo" type="file" accept="image/*" required />

          <label for="captionInput" class="label">Caption (optional)</label>
          <textarea
            id="captionInput"
            name="caption"
            rows="3"
            placeholder="Add a note for this photo"
          ></textarea>

          <button id="uploadBtn" type="submit" class="btn primary">Upload Photo</button>
          <p id="uploadMessage" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
